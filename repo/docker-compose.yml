services:
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://meridian_app:meridian_secret@mysql:3306/meridian?serverVersion=8.0&charset=utf8mb4"
      APP_ENV: dev
      APP_SECRET: meridian_local_dev_secret_change_in_prod
      ENCRYPTION_MASTER_KEY: "base64:dGhpcyBpcyBhIGRldmVsb3BtZW50IG1hc3Rlcg=="
    networks:
      - meridian

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./backend/public:/var/www/backend/public:ro
    depends_on:
      - php
    networks:
      - meridian

  mysql:
    image: mysql:8.0
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-meridian_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-meridian}
      MYSQL_USER: ${MYSQL_USER:-meridian_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-meridian_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-meridian_root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meridian

  node:
    image: node:18-alpine
    working_dir: /var/www/frontend
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./frontend:/var/www/frontend
    environment:
      # Use relative URL so Vite proxy forwards API calls to nginx (needed for E2E)
      VITE_API_URL: /api/v1
    command: sh -c "npm install --force && npm run dev -- --host 0.0.0.0"
    networks:
      - meridian

  playwright:
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    working_dir: /var/www/frontend
    volumes:
      - ./frontend:/var/www/frontend
    depends_on:
      - node
      - nginx
    environment:
      E2E_BASE_URL: http://node:5173
      HOME: /root
    networks:
      - meridian
    profiles:
      - e2e
    command: ["sh", "-c", "npm install --force --silent 2>/dev/null && npx playwright install chromium 2>&1 && npx playwright test --config=playwright.config.ts --reporter=list"]

  worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      php:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://meridian_app:meridian_secret@mysql:3306/meridian?serverVersion=8.0&charset=utf8mb4"
      APP_ENV: dev
      APP_SECRET: meridian_local_dev_secret_change_in_prod
      ENCRYPTION_MASTER_KEY: "base64:dGhpcyBpcyBhIGRldmVsb3BtZW50IG1hc3Rlcg=="
    entrypoint: ["bash", "-c"]
    command: ["cd /var/www/backend && if [ ! -d vendor ]; then composer install --no-interaction; fi && php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M"]
    restart: unless-stopped
    networks:
      - meridian

volumes:
  mysql_data:

networks:
  meridian:
    driver: bridge
